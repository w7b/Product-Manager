version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: pm-db
    environment:
      POSTGRES_DB: productmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d productmanager"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pm-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm-api
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: productmanager
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: minha-chave-secreta-super-segura-256-bits-producao
      JWT_ACCESS_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 604800000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pm-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pm-web
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - pm-net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  pm-net:
    driver: bridge
